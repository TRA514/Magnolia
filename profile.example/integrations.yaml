# Which external tools this operator uses. Onboarding fills these in.
project_management:
  provider: "none"       # jira | asana | linear | none
  jira:
    cloud_id: ""         # e.g. yourorg.atlassian.net
    project_key: ""      # e.g. ABC
    component_id: ""
    auto_label: ""
    default_assignee: "" # Jira accountId
    board_id: ""         # e.g. 1096 — the team's Jira board id
    product_area: ""     # e.g. Home AI DLC — the team's product-area / swim-lane label
transcript:
  provider: "none"       # otter | granola | none
  target: "datasets/meetings/"
calendar:
  provider: "none"       # m365 | google | none
doc_sync:
  onedrive_root: ""      # auto-detected by the Doctor (OneDrive-* under ~/Library/CloudStorage)
  sharepoint_site: "PM-OS"
  enabled: false
analytics:
  pendo:
    provider: "none"      # pendo | none
    subscription_id: ""
    app_ids: {}
  databricks:
    provider: "none"      # databricks | none
    catalog: ""
    sources: {}
